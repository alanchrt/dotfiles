---
- name: Install Karabiner-Elements
  ansible.builtin.shell: |
    echo '{{ ansible_become_password }}' | sudo -S true 2>/dev/null
    brew install --cask karabiner-elements
  args:
    creates: /Applications/Karabiner-Elements.app
  # no_log: true  # temporarily disabled for debugging

- name: Create Karabiner config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/karabiner"
    state: directory

- name: Deploy Karabiner configuration
  ansible.builtin.copy:
    src: files/karabiner.json
    dest: "{{ ansible_env.HOME }}/.config/karabiner/karabiner.json"
