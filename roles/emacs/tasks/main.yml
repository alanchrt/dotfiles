---
# Platform-specific packages
- ansible.builtin.include_tasks: linux.yml
  when: ansible_os_family == 'RedHat'

- ansible.builtin.include_tasks: macos.yml
  when: ansible_os_family == 'Darwin'

# Shared Doom Emacs setup
- name: Check if .emacs.d is a directory
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.emacs.d"
  register: emacs_d

- name: Remove default .emacs.d if it is a directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.emacs.d"
    state: absent
  when: emacs_d.stat.exists and emacs_d.stat.isdir

- name: Symlink .emacs.d to .config/emacs
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/.config/emacs"
    dest: "{{ ansible_env.HOME }}/.emacs.d"
    state: link

- name: Clone doom emacs
  ansible.builtin.git:
    repo: https://github.com/doomemacs/doomemacs
    dest: "{{ ansible_env.HOME }}/.config/emacs"
  register: doom_clone

- name: Install doom emacs
  ansible.builtin.shell: yes | {{ ansible_env.HOME }}/.config/emacs/bin/doom install --no-env
  args:
    creates: "{{ ansible_env.HOME }}/.config/emacs/.local"

- name: Sync doom packages
  ansible.builtin.command: "{{ ansible_env.HOME }}/.config/emacs/bin/doom sync"
  when: doom_clone.changed
  changed_when: false

- name: Create notes directory for org files
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/Documents/Notes"
    state: directory
