---
# Platform-specific packages
- ansible.builtin.include_tasks: linux.yml
  when: ansible_os_family == 'RedHat'

- ansible.builtin.include_tasks: macos.yml
  when: ansible_os_family == 'Darwin'

# Shared font downloads
- name: Create fonts directory
  ansible.builtin.file:
    path: "{{ fonts_dir }}"
    state: directory

- name: Install miscellaneous fonts
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ fonts_dir }}/{{ item.name }}.ttf"
  with_items:
    # spacemacs
    - name: Quivira
      url: http://www.quivira-font.com/files/Quivira.ttf
    # powerlevel10k
    - name: MesloLGS NF Regular
      url: https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Regular.ttf
    - name: MesloLGS NF Bold
      url: https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold.ttf
    - name: MesloLGS NF Italic
      url: https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Italic.ttf
    - name: MesloLGS NF Bold Italic
      url: https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold%20Italic.ttf
    # Doom Emacs nerd-icons
    - name: SymbolsNerdFontMono-Regular
      url: https://github.com/ryanoasis/nerd-fonts/raw/master/patched-fonts/NerdFontsSymbolsOnly/SymbolsNerdFontMono-Regular.ttf
  register: install_fonts

- name: Refresh font cache
  ansible.builtin.shell: fc-cache --force
  when: install_fonts.changed and ansible_os_family == 'RedHat'
