---
- name: Add walker repository
  become: yes
  community.general.copr:
    name: errornointernet/walker

- name: Install walker and dependencies
  become: yes
  dnf:
    name:
      - elephant
      - gtk4-layer-shell
      - walker
      - ydotool
      - wl-clipboard

- name: Disable system-level ydotool service
  become: yes
  systemd:
    name: ydotool
    enabled: no
    state: stopped
  ignore_errors: yes

- name: Create uinput udev rule for ydotool
  become: yes
  copy:
    dest: /etc/udev/rules.d/80-uinput.rules
    content: |
      KERNEL=="uinput", MODE="0660", GROUP="input"
    mode: "0644"

- name: Add user to input group
  become: yes
  user:
    name: "{{ ansible_user_id }}"
    groups: input
    append: yes

- name: Create systemd user directory
  file:
    path: ~/.config/systemd/user
    state: directory
    mode: "0755"

- name: Create ydotoold user service
  copy:
    dest: ~/.config/systemd/user/ydotoold.service
    content: |
      [Unit]
      Description=ydotoold - ydotool daemon (user)
      After=default.target

      [Service]
      Type=simple
      Restart=always
      RestartSec=3
      ExecStart=/usr/bin/ydotoold

      [Install]
      WantedBy=default.target
    mode: "0644"

- name: Enable ydotoold user service
  systemd:
    name: ydotoold
    scope: user
    daemon_reload: yes
    enabled: yes
    state: started

- name: Create walker user service
  copy:
    dest: ~/.config/systemd/user/walker.service
    content: |
      [Unit]
      Description=Walker Application Launcher
      After=graphical-session.target

      [Service]
      Type=simple
      Restart=on-failure
      RestartSec=2
      ExecStart=/usr/bin/walker --gapplication-service

      [Install]
      WantedBy=graphical-session.target
    mode: "0644"

- name: Enable walker user service
  systemd:
    name: walker
    scope: user
    daemon_reload: yes
    enabled: yes
    state: started

- name: Deploy walker-projects
  copy:
    src: walker-projects
    dest: ~/.local/bin/walker-projects
    mode: "0755"

- name: Deploy walker-rbw
  copy:
    src: walker-rbw
    dest: ~/.local/bin/walker-rbw
    mode: "0755"

- name: Create autostart directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/autostart"
    state: directory

- name: Create elephant autostart entry
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.config/autostart/elephant.desktop"
    content: |
      [Desktop Entry]
      Type=Application
      Name=Elephant
      Exec=elephant
      X-GNOME-Autostart-enabled=true
    mode: "0644"

- name: Start elephant if not running
  ansible.builtin.shell: pgrep -x elephant || nohup elephant &
  changed_when: false
