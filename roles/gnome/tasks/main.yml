---
- name: Disable extension version validation
  community.general.dconf:
    key: "/org/gnome/shell/disable-extension-version-validation"
    value: "true"

- name: Create backgrounds and themes directories
  file:
    path: "{{ item }}"
    state: directory
  with_items:
    - "{{ ansible_env.HOME }}/.local/share/backgrounds"
    - "{{ ansible_env.HOME }}/.themes"

- name: Copy wallpaper graphic
  copy:
    src: files/dracula-arab-tile.png
    dest: "{{ ansible_env.HOME }}/.local/share/backgrounds/dracula-arab-tile.png"

- name: Set wallpaper
  community.general.dconf:
    key: "{{ item }}"
    value: "'file://{{ ansible_env.HOME }}/.local/share/backgrounds/dracula-arab-tile.png'"
  with_items:
    - /org/gnome/desktop/background/picture-uri
    - /org/gnome/desktop/background/picture-uri-dark
    - /org/gnome/desktop/screensaver/picture-uri

- name: Set color scheme
  community.general.dconf:
    key: /org/gnome/desktop/interface/color-scheme
    value: "'prefer-dark'"

- name: Download Dracula GTK theme
  unarchive:
    src: https://github.com/dracula/gtk/releases/download/v3.0/Dracula.tar.xz
    remote_src: yes
    dest: "{{ ansible_env.HOME }}/.themes"
    creates: "{{ ansible_env.HOME }}/.themes/Dracula/index.theme"

- name: Check for panel color override
  stat:
    path: "{{ ansible_env.HOME }}/.config/dotfiles/panel_color"
  register: panel_color_stat

- name: Read panel color override
  slurp:
    src: "{{ ansible_env.HOME }}/.config/dotfiles/panel_color"
  register: panel_color_file
  when: panel_color_stat.stat.exists

- name: Create DotfilesPanelColor GNOME Shell theme directory
  file:
    path: "{{ ansible_env.HOME }}/.themes/DotfilesPanelColor/gnome-shell"
    state: directory

- name: Check for GNOME Shell theme base CSS
  stat:
    path: "{{ ansible_env.HOME }}/.themes/DotfilesPanelColor/gnome-shell/gnome-shell.css"
  register: shell_css_file

- name: Extract default GNOME Shell CSS
  command: >
    gresource extract /usr/share/gnome-shell/gnome-shell-theme.gresource
    /org/gnome/shell/theme/gnome-shell-dark.css
  register: gnome_default_css
  changed_when: false
  when: not shell_css_file.stat.exists

- name: Write default GNOME Shell CSS as theme base
  copy:
    content: "{{ gnome_default_css.stdout }}"
    dest: "{{ ansible_env.HOME }}/.themes/DotfilesPanelColor/gnome-shell/gnome-shell.css"
  when: not shell_css_file.stat.exists

- name: Apply panel color override to GNOME Shell CSS
  blockinfile:
    path: "{{ ansible_env.HOME }}/.themes/DotfilesPanelColor/gnome-shell/gnome-shell.css"
    marker: "/* {mark} DOTFILES PANEL COLOR OVERRIDE */"
    block: |
      #panel {
        background-color: {{ panel_color_file.content | b64decode | trim }};
      }
  when:
    - panel_color_stat.stat.exists
    - (panel_color_file.content | b64decode | trim) != ''

- name: Check for existing panel color override marker
  command: grep -q "DOTFILES PANEL COLOR OVERRIDE" {{ ansible_env.HOME }}/.themes/DotfilesPanelColor/gnome-shell/gnome-shell.css
  register: panel_color_marker
  changed_when: false
  failed_when: false

- name: Remove panel color override if not set
  blockinfile:
    path: "{{ ansible_env.HOME }}/.themes/DotfilesPanelColor/gnome-shell/gnome-shell.css"
    marker: "/* {mark} DOTFILES PANEL COLOR OVERRIDE */"
    state: absent
  when:
    - panel_color_marker.rc == 0
    - not panel_color_stat.stat.exists or (panel_color_file.content | b64decode | trim) == ''

- name: Set GTK theme
  community.general.dconf:
    key: "{{ item }}"
    value: "'Dracula'"
  with_items:
    - /org/gnome/desktop/interface/gtk-theme
    - /org/gnome/desktop/wm/preferences/theme

- name: Set GNOME Shell theme
  community.general.dconf:
    key: /org/gnome/shell/extensions/user-theme/name
    value: "'DotfilesPanelColor'"

- name: Check if papirus icon theme is installed
  command: rpm -q papirus-icon-theme
  register: papirus_installed
  changed_when: false
  failed_when: false

- name: Install papirus icon theme
  become: yes
  dnf:
    name: papirus-icon-theme
  when: papirus_installed.rc != 0
  register: papirus_icons

- name: Install papirus-folders script
  become: yes
  get_url:
    url: https://raw.githubusercontent.com/PapirusDevelopmentTeam/papirus-folders/master/papirus-folders
    dest: /usr/local/bin/papirus-folders
    mode: "0755"

- name: Set Papirus folder color to violet (Dracula)
  command: papirus-folders -C violet --theme Papirus
  when: papirus_icons.changed
  changed_when: false

- name: Set icon theme
  community.general.dconf:
    key: /org/gnome/desktop/interface/icon-theme
    value: "'Papirus'"

- name: Set 12h clock format
  community.general.dconf:
    key: /org/gnome/desktop/interface/clock-format
    value: "'12h'"

- name: Make workspaces span displays
  community.general.dconf:
    key: /org/gnome/mutter/workspaces-only-on-primary
    value: "false"

- name: Show only current workspace windows in app switcher
  community.general.dconf:
    key: /org/gnome/shell/app-switcher/current-workspace-only
    value: "true"

- name: Don't show notifications in lock screen
  community.general.dconf:
    key: /org/gnome/desktop/notifications/show-in-lock-screen
    value: "false"

- name: Disable super key activities binding
  community.general.dconf:
    key: /org/gnome/mutter/overlay-key
    value: "''"

- name: Load keybinding configuration
  shell: "dconf load /org/gnome/ < {{ role_path }}/files/keybindings.conf"
  changed_when: false

- name: Install GNOME Shell extensions
  become: yes
  dnf:
    name:
      - gnome-shell-extension-caffeine
      - gnome-shell-extension-no-overview
      - gnome-shell-extension-system-monitor-applet
      - gnome-shell-extension-user-theme
      - gnome-shell-extension-appindicator

- name: Remove user-installed extensions now managed by DNF
  file:
    path: "{{ ansible_env.HOME }}/.local/share/gnome-shell/extensions/{{ item }}"
    state: absent
  loop:
    - caffeine@patapon.info
    - no-overview@fthx
    - system-monitor-next@paradoxxx.zero.gmail.com
    - appindicator@rgcjonas.gmail.com

- name: Create user extensions directory
  file:
    path: "{{ ansible_env.HOME }}/.local/share/gnome-shell/extensions"
    state: directory

- name: Create ddterm extension directory
  file:
    path: "{{ ansible_env.HOME }}/.local/share/gnome-shell/extensions/ddterm@amezin.github.com"
    state: directory

- name: Install ddterm extension
  unarchive:
    src: https://extensions.gnome.org/extension-data/ddtermamezin.github.com.v64.shell-extension.zip
    remote_src: yes
    dest: "{{ ansible_env.HOME }}/.local/share/gnome-shell/extensions/ddterm@amezin.github.com"
    creates: "{{ ansible_env.HOME }}/.local/share/gnome-shell/extensions/ddterm@amezin.github.com/metadata.json"

- name: Compile ddterm GSettings schemas
  command: glib-compile-schemas {{ ansible_env.HOME }}/.local/share/gnome-shell/extensions/ddterm@amezin.github.com/schemas/
  args:
    creates: "{{ ansible_env.HOME }}/.local/share/gnome-shell/extensions/ddterm@amezin.github.com/schemas/gschemas.compiled"

- name: Create unite extension directory
  file:
    path: "{{ ansible_env.HOME }}/.local/share/gnome-shell/extensions/unite@hardpixel.eu"
    state: directory

- name: Install unite extension
  unarchive:
    src: https://github.com/hardpixel/unite-shell/releases/download/v84/unite-v84.zip
    remote_src: yes
    dest: "{{ ansible_env.HOME }}/.local/share/gnome-shell/extensions/unite@hardpixel.eu"
    creates: "{{ ansible_env.HOME }}/.local/share/gnome-shell/extensions/unite@hardpixel.eu/metadata.json"

- name: Enable GNOME Shell extensions
  community.general.dconf:
    key: /org/gnome/shell/enabled-extensions
    value: "['appindicator@rgcjonas.gmail.com', 'caffeine@patapon.info', 'ddterm@amezin.github.com', 'no-overview@fthx', 'unite@hardpixel.eu', 'nordvpnquicktoggle@wedaxi.com', 'system-monitor-next@paradoxxx.zero.gmail.com', 'user-theme@gnome-shell-extensions.gcampax.github.com']"

- name: Configure caffeine
  shell: "dconf load /org/gnome/shell/extensions/caffeine/ < {{ role_path }}/files/caffeine.conf"
  changed_when: false

- name: Configure system-monitor-next
  shell: "dconf load /org/gnome/shell/extensions/system-monitor-next-applet/ < {{ role_path }}/files/system-monitor.conf"
  changed_when: false

- name: Configure unite
  shell: "dconf load /org/gnome/shell/extensions/unite/ < {{ role_path }}/files/unite.conf"
  changed_when: false

- name: Configure appindicator
  shell: "dconf load /org/gnome/shell/extensions/appindicator/ < {{ role_path }}/files/appindicator.conf"
  changed_when: false

- name: Remind user to log out and back in
  debug:
    msg: "GNOME Shell extensions were updated. Log out and back in to apply changes."

- name: Disable NetworkManager connectivity check (fixes VPN question mark icon)
  become: yes
  copy:
    src: files/no-connectivity-check.conf
    dest: /etc/NetworkManager/conf.d/no-connectivity-check.conf
    owner: root
    group: root
    mode: "0644"

- name: Install GNOME chrome connector
  become: yes
  dnf:
    name: gnome-browser-connector
