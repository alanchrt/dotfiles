---
# Platform-specific install (node, fnm, watchman)
- ansible.builtin.include_tasks: linux.yml
  when: ansible_os_family == 'RedHat'

- ansible.builtin.include_tasks: macos.yml
  when: ansible_os_family == 'Darwin'

# Shared: bun's official installer drops a self-contained binary into
# ~/.bun/bin (already on PATH via .bashrc) and works on Linux and macOS alike.
- name: Install bun
  ansible.builtin.shell: curl -fsSL https://bun.sh/install | bash
  args:
    creates: "{{ ansible_env.HOME }}/.bun/bin/bun"

# Shared: global node tooling. On Fedora node lives under /usr and needs root;
# Homebrew's prefix is user-owned, so sudo there would clobber ownership.
- name: Install common node tools
  become: "{{ ansible_os_family == 'RedHat' }}"
  community.general.npm:
    name: "{{ item }}"
    global: yes
  with_items:
    - yarn
    - typescript
    - typescript-language-server
    - eslint
    - "@babel/eslint-parser"
    - eslint-plugin-react
    - prettier
    - "@tailwindcss/language-server"
    - stylelint
